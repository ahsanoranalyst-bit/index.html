<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Intelligence | Optimization Suite</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --gold: #ffd700;
            --dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark);
            color: white;
            text-align: center;
        }

        /* 1. Circular Logo Section */
        .header-branding {
            padding: 20px 0;
            background: var(--dark);
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: var(--glass);
            border: 2px solid var(--cyan);
            border-radius: 50%; /* This makes it a circle */
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 15px var(--cyan);
        }

        .logo-circle img {
            width: 80%; /* Adjust logo size inside circle */
            height: auto;
        }

        /* 2. Top Banner Image (Full View) */
        .top-banner {
            width: 100%;
            background-color: #000;
            border-bottom: 2px solid var(--cyan);
        }

        .top-banner img {
            width: 100%;
            max-height: 500px;
            object-fit: contain; /* This ensures image is not cropped */
            display: block;
        }

        /* 3. Content Section */
        .main-content {
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            color: var(--cyan);
            text-shadow: 0 0 15px var(--cyan);
            margin: 20px 0 10px;
        }

        .tagline {
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 35px;
        }

        /* 4. Buttons */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .btn {
            padding: 15px 35px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-view {
            background: var(--cyan);
            color: black;
        }

        .btn-view:hover {
            box-shadow: 0 0 20px var(--cyan);
            transform: scale(1.05);
        }

        .btn-paid {
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        .btn-paid:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
            transform: scale(1.05);
        }

        /* Industries Section */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .card h3 { color: var(--gold); }
    </style>
</head>
<body>

    <div class="header-branding">
        <div class="logo-circle">
            <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=SI'">
        </div>
    </div>

    <div class="top-banner">
        <img src="background.jpg" alt="System Intelligence Banner">
    </div>

    <div class="main-content">
        <h1>SYSTEM INTELLIGENCE</h1>
        <p class="tagline">Advanced Industrial Optimization & Analytics Suite</p>

        <div class="btn-container">
            <a href="YOUR_DEMO_LINK" target="_blank" class="btn btn-view">View Only (Demo)</a>
            <a href="YOUR_PRO_LINK" target="_blank" class="btn btn-paid">Paid Version (Pro)</a>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Logistics</h3>
                <p>Route & Fleet Optimization</p>
            </div>
            <div class="card">
                <h3>Education</h3>
                <p>Institutional Timetabling</p>
            </div>
            <div class="card">
                <h3>Industry</h3>
                <p>Resource Allocation</p>
            </div>
        </div>
    </div>

    <footer style="padding: 40px; color: #444;">&copy; 2026 System Intelligence</footer>

</body>
</html>
